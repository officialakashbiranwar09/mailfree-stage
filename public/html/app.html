<script src="/js/englishize.js" defer></script>
<div class="topbar">
  <div class="brand">
    <span class="brand-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <use href="/icons/sprites.svg#icon-mail"/>
      </svg>
    </span>
    <span class="brand-text">iDing'sTemporary Mailbox</span>
  </div>
  <div id="role-badge" class="role-badge" title="Welcome："></div>
  <div class="nav-actions">
    <a id="admin" class="btn btn-ghost" href="/templates/loading.html?redirect=%2Fadmin.html&status=Checking%20permissions%E2%80%A6" title="User Management" style="display:none">
      <span class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <use href="/icons/sprites.svg#icon-wrench"/>
        </svg>
      </span>
      <span class="btn-text">User Management</span>
    </a>
    <a id="all-mailboxes" class="btn btn-ghost" href="/templates/loading.html?redirect=%2Fhtml%2Fmailboxes.html&status=Opening%20mailbox%20overview%E2%80%A6" title="All Mailboxes" style="display:none">
      <span class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <use href="/icons/sprites.svg#icon-package"/>
        </svg>
      </span>
      <span class="btn-text">All Mailboxes</span>
    </a>
    <button id="logout" class="btn btn-secondary" title="Logout">
      <span class="btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <use href="/icons/sprites.svg#icon-logout"/>
        </svg>
      </span>
      <span class="btn-text">Logout</span>
    </button>
  </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-header">
        <h3>
          <span class="sidebar-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-inbox"/>
            </svg>
          </span>
          <span class="sidebar-title">Recent Mailboxes</span>
        </h3>
        <div class="sidebar-header-actions">
          <span id="quota" class="quota-display"></span>
          <button id="sidebar-toggle" class="sidebar-toggle-btn" title="收起侧板" aria-label="收起侧边栏">
            <span id="sidebar-toggle-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <use href="/icons/sprites.svg#icon-chevron-left"/>
              </svg>
            </span>
          </button>
          <button id="mb-toggle" class="sidebar-toggle-btn" title="展开/收起Recent Mailboxes" aria-label="展开或收起Recent Mailboxes列表">
            <span id="mb-toggle-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <use href="/icons/sprites.svg#icon-chevron-down"/>
              </svg>
            </span>
          </button>
        </div>
      </div>
      <div class="sidebar-search">
        <input id="mb-search" class="input sidebar-search-input" placeholder="SearchRecent Mailboxes" aria-label="SearchRecent Mailboxes" />
      </div>
      <div id="mb-list"></div>
      <div id="mb-loading" style="margin-top:12px"></div>
      <div id="mb-pager" class="pager" style="display:none;margin-top:16px">
        <button id="mb-prev" class="btn btn-ghost btn-sm">上一页</button>
        <span id="mb-page-info" class="muted" style="min-width:100px;text-align:center"></span>
        <button id="mb-next" class="btn btn-ghost btn-sm">下一页</button>
      </div>
    </div>
    <div class="main">
      <div class="card generate-card">
        <h2>
          <span class="card-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-sparkles"/>
            </svg>
          </span>
          生成Temporary Mailbox
        </h2>

        <div class="mailbox-layout">
          <!-- 左侧：Mailbox Address展示 -->
          <div class="mailbox-display-section">
            <div class="mailbox-display-content">
              <div class="section-header">
                <span class="section-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-mail"/>
                  </svg>
                </span>
                <span class="section-title">Current Mailbox</span>
              </div>
              <div id="email" class="email-display">
                <span id="email-text" class="email-text"><span class="placeholder-text">Click the button on the right to create a mailbox address</span></span>
                <div id="custom-overlay" class="custom-overlay" style="display:none">
                  <input id="custom-local-overlay" class="input custom-input" type="text" placeholder="Letters/numbers/._- only" aria-label="自定义Mailbox User名" />
                  <button id="create-custom-overlay" class="btn btn-primary btn-sm">Create</button>
                </div>
              </div>
            </div>
            <div class="mailbox-actions" id="email-actions" style="display:none">
              <button id="copy" class="btn btn-secondary" style="width:100%" aria-label="Copy Mailbox地址">
                <span class="btn-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-copy"/>
                  </svg>
                </span>
                <span>Copy Mailbox</span>
              </button>
              <button id="compose" class="btn btn-primary" style="width:100%" aria-label="Compose Mail">
                <span class="btn-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-send"/>
                  </svg>
                </span>
                <span>Compose Mail</span>
              </button>
              <button id="clear" class="btn btn-danger" style="width:100%" aria-label="Clear Mail">
                <span class="btn-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-trash"/>
                  </svg>
                </span>
                <span>Clear Mail</span>
              </button>
              <button id="refresh" class="btn btn-ghost" style="width:100%" aria-label="Refresh Mail">
                <span class="btn-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-refresh"/>
                  </svg>
                </span>
                <span>Refresh Mail</span>
              </button>
              <button id="forward-setting" class="btn btn-ghost" style="width:100%" aria-label="Forward Settings">
                <span class="btn-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-forward"/>
                  </svg>
                </span>
                <span>Forward Settings</span>
              </button>
              <button id="toggle-favorite" class="btn btn-ghost" style="width:100%" aria-label="Favorite Mailbox">
                <span class="btn-icon" id="favorite-icon">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-star-empty"/>
                  </svg>
                </span>
                <span id="favorite-text">Favorite Mailbox</span>
              </button>
            </div>
          </div>

          <!-- 右侧：Mailbox Settings -->
          <div class="mailbox-config-section">
            <div class="section-header">
              <span class="section-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <use href="/icons/sprites.svg#icon-settings"/>
                </svg>
              </span>
              <span class="section-title">Mailbox Settings</span>
              <button id="config-toggle" class="sidebar-toggle-btn" title="展开/收起Configuration" aria-label="展开或收起Configuration面板">
                <span id="config-toggle-icon">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <use href="/icons/sprites.svg#icon-chevron-down"/>
                  </svg>
                </span>
              </button>
            </div>
            <div class="config-form">
              <div class="config-item">
                <label class="config-label" for="domain-select">
                  <span class="label-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <use href="/icons/sprites.svg#icon-globe"/>
                    </svg>
                  </span>
                  <span>Domain</span>
                </label>
                <select id="domain-select" class="select config-select" aria-label="选择Domain域名"></select>
              </div>
              <div class="config-item">
                <label class="config-label" for="len-range">
                  <span class="label-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <use href="/icons/sprites.svg#icon-ruler"/>
                    </svg>
                  </span>
                  <span>Username Length</span>
                </label>
                <div class="range-container">
                  <input id="len-range" class="range" type="range" min="8" max="30" step="1" value="8" aria-label="SettingsUsername Length" />
                  <div class="range-display">
                    <span id="len-val" class="len-value">8</span>
                    <span class="len-unit">位</span>
                  </div>
                </div>
              </div>
               <div class="generate-action">
                 <div class="generate-buttons" style="display: flex; gap: 8px; margin-bottom: 8px; width: 100%;">
                   <button id="gen" class="btn btn-generate" style="flex: 1;" aria-label="Random GenerateMailbox">
                     <span class="btn-icon">
                       <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                         <use href="/icons/sprites.svg#icon-dice"/>
                       </svg>
                     </span>
                     <span>Random Generate</span>
                   </button>
                   <button id="gen-name" class="btn btn-primary" style="flex: 1;" title="使用Random Name生成Mailbox" aria-label="使用Random Name生成Mailbox">
                     <span class="btn-icon">
                       <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                         <use href="/icons/sprites.svg#icon-user"/>
                       </svg>
                     </span>
                     <span>Random Name</span>
                   </button>
                 </div>
                 <button id="toggle-custom" class="btn btn-secondary btn-sm" style="width: 100%;" title="自定义Mailbox" aria-label="切换到自定义Mailbox模式">Switch to Custom</button>
               </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card inbox-card" id="list-card" style="display:none">
        <div class="listcard-header">
          <h2 class="listcard-title">
            <span class="card-icon" id="box-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <use href="/icons/sprites.svg#icon-inbox"/>
              </svg>
            </span>
            <span id="box-title">Inbox</span>
          </h2>
          <div class="view-switch">
            <button id="tab-inbox" class="seg-btn" aria-pressed="true">Inbox</button>
            <button id="tab-sent" class="seg-btn" aria-pressed="false">Sent Mail</button>
          </div>
          <div id="list-status" class="loading-indicator" style="pointer-events:none" role="status" aria-live="polite">
            <div id="list-spinner" class="spinner"></div>
            <span id="list-status-text">Loading…</span>
          </div>
        </div>
        <div class="list-viewport" style="position:relative;contain:layout paint;isolation:isolate;">
          <div id="list" class="list"></div>
          <div id="list-pager" class="pager" style="display:none">
            <button id="prev-page" class="btn btn-ghost btn-sm">上一页</button>
            <span id="page-info" class="muted" style="min-width:100px;text-align:center"></span>
            <button id="next-page" class="btn btn-ghost btn-sm">下一页</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-slot"></div>

  <div class="modal" id="email-modal">
    <div class="modal-card">
      <div class="modal-header">
        <div id="modal-subject">
          <span class="modal-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-mail"/>
            </svg>
          </span>
          <span>Email Details</span>
        </div>
        <button id="modal-close" class="close" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-x"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div id="modal-content"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="confirm-modal">
    <div class="modal-card confirm-card">
      <div class="modal-header confirm-header">
        <div>
          <span class="modal-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-alert"/>
            </svg>
          </span>
          <span>Confirm Action</span>
        </div>
        <button id="confirm-close" class="close" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-x"/>
          </svg>
        </button>
      </div>
      <div class="modal-body confirm-body">
        <div id="confirm-message" class="confirm-message"></div>
        <div class="confirm-actions">
          <button id="confirm-cancel" class="btn btn-secondary">Cancel</button>
          <button id="confirm-ok" class="btn btn-danger">OK</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal" id="compose-modal">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <span class="modal-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-send"/>
            </svg>
          </span>
          <span>New Email</span>
        </div>
        <button id="compose-close" class="close" aria-label="关闭">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-x"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="compose-form">
          <div class="field-group">
            <label class="field-label" for="compose-to">Recipients</label>
            <input id="compose-to" class="input field-input" type="text" placeholder="foo@example.com, bar@example.com" aria-describedby="compose-to-hint" />
            <div id="compose-to-hint" class="field-hint">多个地址请以逗号分隔</div>
          </div>
          <div class="field-group">
            <label class="field-label" for="compose-from-name">From Name (Optional)</label>
            <input id="compose-from-name" class="input field-input" type="text" placeholder="例如：iDing 支持团队" />
          </div>
          <div class="field-group">
            <label class="field-label" for="compose-subject">Subject</label>
            <input id="compose-subject" class="input field-input" type="text" placeholder="Subject" />
          </div>
          <div class="field-group">
            <label class="field-label" for="compose-body">Message</label>
            <textarea id="compose-body" class="textarea field-textarea" rows="10" placeholder="Please enterEmail Content"></textarea>
          </div>
          <div class="compose-actions">
            <button id="compose-cancel" class="btn btn-secondary">Cancel</button>
            <button id="compose-send" class="btn btn-primary">发送</button>
          </div>
        </div>
      </div>
    </div>
  </div>
