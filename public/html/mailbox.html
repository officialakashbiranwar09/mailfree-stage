<!DOCTYPE html>
<html lang="en" class="precheck-hide">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的Mailbox - iDing'sTemporary Mailbox</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>.precheck-hide body{ visibility: hidden !important; }</style>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/app.css" />
  <link rel="stylesheet" href="/css/app-sidebar.css" />
  <link rel="stylesheet" href="/css/app-mailbox.css" />
  <link rel="stylesheet" href="/css/app-compose.css" />
  <link rel="stylesheet" href="/css/app-modal.css" />
  <link rel="stylesheet" href="/css/app-responsive.css" />
  <link rel="stylesheet" href="/css/mailbox.css" />
  <script src="/js/englishize.js" defer></script>
  <!-- 暗黑模式样式 -->
  <!-- Subject切换支持 -->
  <script src="/js/theme-toggle.js"></script>
  <script src="/js/auth-guard.js" defer></script>
  <script>
    // 访问Mailbox页先做前端快速鉴权，仅允许 mailbox 角色
    (function(){
      fetch('/api/session', { headers: { 'Cache-Control': 'no-cache' } })
        .then(r => r.ok ? r.json() : Promise.reject('unauth'))
        .then(s => {
          if (s && s.role === 'mailbox'){
            try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ }
            return;
          }
          // 其他角色：回Home
          location.replace('/');
        })
        .catch(() => {
          // 未Access：进入加载页做鉴权
          if (window.AuthGuard) { window.AuthGuard.goLoading('/html/mailbox.html', 'Checking permissions…'); }
          else { location.replace('/templates/loading.html?redirect=%2Fhtml%2Fmailbox.html&status=' + encodeURIComponent('Checking permissions…')); }
        });
    })();
  </script>
</head>
<body>
<!-- SVG Icon Sprites -->
<svg style="display:none">
  <use href="/icons/sprites.svg#icon-mail"/>
</svg>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <span class="brand-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <use href="/icons/sprites.svg#icon-mail"/>
        </svg>
      </span>
      <span class="brand-text">iDing'sTemporary Mailbox</span>
    </div>
    <div id="role-badge" class="role-badge" title="Mailbox User">Mailbox User</div>
    <div class="nav-actions">
      <button id="logout" class="btn btn-secondary" title="Logout">
        <span class="btn-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-logout"/>
          </svg>
        </span>
        <span class="btn-text">Logout</span>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="container mailbox-container">
  <div class="main mailbox-main">
    <!-- Mailbox信息卡片 -->
    <div class="card mailbox-info-card">
      <h2>
        <span class="card-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-inbox"/>
          </svg>
        </span>
        我的Mailbox
      </h2>
      <div class="mailbox-info">
        <div class="mailbox-display">
          <span class="mailbox-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-mail"/>
            </svg>
          </span>
          <span id="current-mailbox" class="mailbox-address">Loading...</span>
          <button id="copy-mailbox" class="btn btn-secondary btn-sm" title="Copy Mailbox地址" aria-label="Copy Mailbox地址">
            <span class="btn-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <use href="/icons/sprites.svg#icon-copy"/>
              </svg>
            </span>
            <span>复制</span>
          </button>
        <!-- 修改Password -->
          <button id="change-password" class="btn btn-ghost btn-sm" title="修改Password" aria-label="修改Password">
            <span class="btn-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <use href="/icons/sprites.svg#icon-lock"/>
              </svg>
            </span>
            <span>修改Password</span>
          </button>
        </div>
        <div class="mailbox-toolbar">
          <div class="toolbar-left">
            <span class="chip chip-unread">未读 <span id="unread-count">0</span></span>
            <span class="chip chip-total">All <span id="total-count">0</span></span>
          </div>
          <div class="toolbar-right">
            <label class="toggle" title="开启后按间隔自动Refresh">
              <input id="auto-refresh" type="checkbox" />
              <span>自动Refresh</span>
            </label>
            <select id="refresh-interval" class="select select-sm" title="Refresh间隔" aria-label="Refresh间隔">
              <option value="10">10秒</option>
              <option value="30" selected>30秒</option>
              <option value="60">60秒</option>
            </select>
            <input id="search-box" class="input input-sm" placeholder="Search发件人/Subject" aria-label="Search发件人或Subject" />
            <button id="clear-filter" class="btn btn-ghost btn-sm" title="Clear筛选">Clear</button>
            <button id="refresh-emails" class="btn btn-ghost" title="立即Refresh" aria-label="RefreshEmail List">
              <span class="btn-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <use href="/icons/sprites.svg#icon-refresh"/>
                </svg>
              </span>
              <span>Refresh</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Inbox卡片 -->
    <div class="card inbox-card">
      <div class="listcard-header">
        <h2 class="listcard-title">
          <span class="card-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <use href="/icons/sprites.svg#icon-mail"/>
            </svg>
          </span>
          <span>Inbox</span>
          <span class="retention-hint">仅保留24小时</span>
        </h2>
        <div id="list-loading" class="loading-indicator no-pointer" role="status" aria-live="polite">
          <div class="spinner"></div>
          <span>Loading…</span>
        </div>
      </div>
      <div class="list-viewport">
        <div id="email-list" class="list"></div>
        <div id="empty-state" class="empty-state" style="display:none">
          <div class="empty-content">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
              <use href="/icons/sprites.svg#icon-inbox-empty"/>
            </svg>
            <span>暂无Email</span>
          </div>
        </div>
        <div id="list-pager" class="pager" style="display:none">
          <button id="prev-page" class="btn btn-ghost btn-sm">上一页</button>
          <span id="page-info" class="muted page-info-center"></span>
          <button id="next-page" class="btn btn-ghost btn-sm">下一页</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-slot"></div>

<!-- Email Details模态框 -->
<div class="modal" id="email-modal">
  <div class="modal-card">
    <div class="modal-header">
      <div id="modal-subject">
        <span class="modal-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-mail"/>
          </svg>
        </span>
        <span>Email Details</span>
      </div>
      <button id="modal-close" class="close" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <use href="/icons/sprites.svg#icon-x"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="modal-content"></div>
    </div>
  </div>
</div>
  <script src="/js/toast-utils.js"></script>
  <script type="module" src="/js/mailbox.js"></script>
<script>
  // 动态加载公共 footer 模板
  (async function(){
    try{
      const res = await fetch('/templates/footer.html', { cache: 'no-cache' });
      const html = await res.text();
      const slot = document.getElementById('footer-slot');
      if (slot){
        slot.outerHTML = html;
        setTimeout(()=>{ const y=document.getElementById('footer-year'); if (y) y.textContent=new Date().getFullYear(); },0);
      }
    }catch(_){ }
  })();
</script>
</body>
</html>
<!-- 确认Delete模态框 -->
<div class="modal" id="confirm-modal">
  <div class="modal-card confirm-card">
    <div class="modal-header confirm-header">
      <div>
        <span class="modal-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-alert"/>
          </svg>
        </span>
        <span>Confirm Action</span>
      </div>
      <button id="confirm-close" class="close" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <use href="/icons/sprites.svg#icon-x"/>
        </svg>
      </button>
    </div>
    <div class="modal-body confirm-body">
      <div id="confirm-message" class="confirm-message"></div>
      <div class="confirm-actions">
        <button id="confirm-cancel" class="btn btn-secondary">Cancel</button>
        <button id="confirm-ok" class="btn btn-danger">OK</button>
      </div>
    </div>
  </div>
</div>

<!-- 修改Password模态框 -->
<div class="modal" id="password-modal">
  <div class="modal-card">
    <div class="modal-header">
      <div>
        <span class="modal-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-lock"/>
          </svg>
        </span>
        <span>修改Password</span>
      </div>
      <button id="password-close" class="close" aria-label="关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <use href="/icons/sprites.svg#icon-x"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="password-hint">
        <span class="hint-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <use href="/icons/sprites.svg#icon-alert"/>
          </svg>
        </span>
        <span>修改Password后需要重新Access</span>
      </div>
      <form id="password-form">
        <div class="form-group">
          <label for="current-password">当前Password</label>
          <input type="password" id="current-password" class="input" placeholder="Please enter当前Password" required />
        </div>
        <div class="form-group">
          <label for="new-password">新Password</label>
          <input type="password" id="new-password" class="input" placeholder="Please enter新Password（至少6位）" minlength="6" required />
        </div>
        <div class="form-group">
          <label for="confirm-password">确认新Password</label>
          <input type="password" id="confirm-password" class="input" placeholder="请再次输入新Password" minlength="6" required />
        </div>
        <div class="form-actions">
          <button type="button" id="password-cancel" class="btn btn-secondary">Cancel</button>
          <button type="submit" id="password-submit" class="btn btn-primary">修改Password</button>
        </div>
      </form>
    </div>
  </div>
</div>
