<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login - Temporary Mailbox</title>
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/css/login.css" />
    <script src="/js/theme-toggle.js" defer></script>
    <script src="/js/englishize.js" defer></script>
    <script src="/js/toast-utils.js" defer></script>
    <script>
      try {
        if (location.hash) sessionStorage.setItem('mf:preservedHash', location.hash);
      } catch (_) {}
    </script>
  </head>
  <body>
    <button class="theme-toggle-login" type="button" aria-label="Toggle theme" title="Toggle theme">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <use href="/icons/sprites.svg#icon-sun"/>
      </svg>
    </button>

    <main class="center">
      <section class="card login-card" aria-labelledby="login-title">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <use href="/icons/sprites.svg#icon-mail"/>
          </svg>
        </div>
        <div class="login">
          <h1 id="login-title" class="login-title">Temporary Mailbox</h1>
          <p class="login-subtitle">Sign in to access your Cloudflare-connected inbox.</p>
        </div>
        <div id="err" class="err" role="alert" aria-live="polite"></div>
        <label class="field-label" for="username">Username</label>
        <input id="username" class="input" type="text" autocomplete="username" placeholder="admin" value="admin" />
        <label class="field-label" for="pwd">Password</label>
        <input id="pwd" class="input" type="password" autocomplete="current-password" placeholder="Enter password" />
        <button id="login" class="btn btn-primary" type="button">Sign In</button>
        <p class="login-footer" style="margin-top: 18px; color: var(--muted); font-size: 13px; line-height: 1.6;">
          Default admin password: `admin@02`
        </p>
      </section>
    </main>

    <script src="/js/login.js" defer></script>
  </body>
</html>
